<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<style>
		body {
			color: var(--vscode-foreground);
			background-color: var(--vscode-editor-background);
			font-family: var(--vscode-editor-font-family, sans-serif);
			font-size: var(--vscode-editor-font-size, 14px);
			line-height: 1.4;
			margin: 0;
			padding: 1em;
		}

		h3 {
			color: var(--vscode-settings-headerForeground, var(--vscode-foreground));
			margin-bottom: 0.75em;
			font-weight: normal;
		}

		select {
			background-color: var(--vscode-editor-background);
			color: var(--vscode-foreground);
			border: 1px solid var(--vscode-settings-dropdownBorder, #808080);
			padding: 0.25em 0.5em;
			min-width: 200px;
			margin-right: 0.5em;
		}

		button {
			background: var(--vscode-button-background);
			color: var(--vscode-button-foreground);
			border: none;
			padding: 0.5em 1em;
			cursor: pointer;
			margin-right: 0.5em;
		}

		button:hover {
			background: var(--vscode-button-hoverBackground, #00000033);
		}

		hr {
			border: 0;
			border-bottom: 1px solid var(--vscode-settings-dropdownBorder, #808080);
			margin: 1em 0;
		}
	</style>
</head>

<body>
	<div>
		<select id="selectedDestinationEl">
			<option value="">None</option>
			#OPTIONS#
		</select>
	</div>
	<div>
		<label>
			<input type="checkbox" id="autoProcessToggleEl" #AUTO_FLATTEN_CHECKED#>
			Auto-Process
		</label>
	</div>
	<div>
		<label>
			<input type="checkbox" id="debugModeToggleEl" #DEBUG_MODE_CHECKED#>
			Debug Mode
		</label>
	</div>

	<hr/>

	<div>
		<button id="processAllBtn">Process/Flatten Now</button>
	</div>

	<script>
		const vscode = acquireVsCodeApi();

		const autoProcessToggleEl = document.getElementById('autoProcessToggleEl');
		const debugModeToggleEl = document.getElementById('debugModeToggleEl');
		const selectedDestinationEl = document.getElementById('selectedDestinationEl');
		const processAllBtn = document.getElementById('processAllBtn');

		autoProcessToggleEl.addEventListener('change', () => {
			vscode.postMessage({
				command: 'toggleAutoProcess',
				value: autoProcessToggleEl.checked
			});
		});

		debugModeToggleEl.addEventListener('change', () => {
			vscode.postMessage({
				command: 'toggleDebugMode',
				value: debugModeToggleEl.checked
			});
		});

		selectedDestinationEl.addEventListener('change', () => {
			vscode.postMessage({
				command: 'selectedDestination',
				value: selectedDestinationEl.value
			});
		});

		processAllBtn.addEventListener('click', () => {
			vscode.postMessage({
				command: 'processAll',
			});
		});
	</script>
</body>

</html>
